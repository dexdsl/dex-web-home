name: sanitize

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  sanitize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Vendor Auth0 SPA SDK
        run: npm run vendor:auth0

      - name: Verify Auth0 vendor asset
        run: npm run verify:auth0-vendor

      - name: Discover repo targets
        run: npm run repo:discover

      - name: Verify Auth0 script order
        run: npm run verify:auth0-html

      - name: Verify protected auth contract
        run: npm run verify:protected-auth

      - name: Repo purity scan
        run: npm run sanitize:scan

      - name: Verify forbidden domains
        run: npm run verify:no-forbidden-domains

      - name: Verify no legacy CDN image URLs
        run: npm run verify:no-legacy-cdn-images

      - name: Verify no dead /static/vta refs
        run: npm run verify:no-dead-static-refs

      - name: Verify local /css and /assets links
        run: npm run verify:assets

      - name: Verify HDR contract
        run: npm run verify:hdr

      - name: Verify favorites contract
        run: npm run verify:favorites

      - name: Verify error/support contract
        run: npm run verify:error-support

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Auth0 runtime test
        run: npm run test:auth0

      - name: Protected refresh runtime test
        run: npm run test:auth-protected-refresh

      - name: Phase 2 pipeline
        run: npm run phase2:all

      - name: Network purity test
        run: npm run test:net

      - name: Polls soft routing test
        run: npm run test:polls-routing

      - name: Achievements loading resilience test
        run: npm run test:achievements-loading

      - name: Favorites lookup parity test
        run: npm run test:favorites-lookup

      - name: Error/support reliability test
        run: npm run test:error-support

      - name: Visual snapshot test
        run: npm run test:visual
