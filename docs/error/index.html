<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>error &mdash; dex digital sample library</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="canonical" href="/error/" />
    <link rel="icon" type="image/x-icon" href="/assets/img/54952c48d15771b9cb2a.ico"/>
    <link rel="stylesheet" href="/css/tokens.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/bridge.squarespace.css">
    <link rel="stylesheet" href="/css/components/dx-layout.css">
    <link rel="stylesheet" href="/css/components/dx-surface.css">
    <link rel="stylesheet" href="/css/components/dx-controls.css">
    <link rel="stylesheet" href="/css/components/dx-nav.css">
    <link rel="stylesheet" href="/css/fonts.css">
    <link rel="stylesheet" href="/assets/css/dex.css">
    <style>
      .dx-utility-wrap {
        max-width: 1080px;
        margin: 0 auto;
        padding: clamp(1.2rem, 2vw, 2rem);
      }
      .dx-utility-stack {
        display: grid;
        gap: 1rem;
      }
      .dx-utility-panel {
        border: 1px solid var(--dx-glass-shell-rim, rgba(255, 255, 255, 0.15));
        border-radius: 16px;
        background: var(--dx-glass-shell-bg, rgba(10, 12, 17, 0.72));
        box-shadow: var(--dx-glass-shell-shadow, 0 18px 38px rgba(0, 0, 0, 0.35));
        padding: clamp(1rem, 2vw, 1.6rem);
      }
      .dx-utility-kicker {
        font-size: 0.75rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        margin: 0 0 0.5rem;
        opacity: 0.75;
      }
      .dx-utility-title {
        margin: 0 0 0.65rem;
        font-size: clamp(1.3rem, 3.2vw, 2.1rem);
      }
      .dx-utility-copy {
        margin: 0;
      }
      .dx-utility-auth-mount {
        display: flex;
        justify-content: flex-end;
        align-items: flex-start;
        min-height: 40px;
        margin-bottom: 0.55rem;
      }
      .dx-utility-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.65rem;
        margin-top: 0.95rem;
      }
      .dx-utility-actions .dx-button-element {
        text-decoration: none;
      }
      #dx-error-diagnostics {
        margin-top: 1rem;
      }
      #dx-error-diagnostics > summary {
        cursor: pointer;
        font-weight: 600;
      }
      #dx-error-diagnostics dl {
        display: grid;
        grid-template-columns: minmax(120px, 170px) 1fr;
        gap: 0.5rem 0.8rem;
        margin: 0.8rem 0;
      }
      #dx-error-diagnostics dt,
      #dx-error-diagnostics dd {
        margin: 0;
      }
      #dx-error-report {
        margin: 0;
        padding: 0.8rem;
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.3);
        overflow: auto;
      }
      #dx-error-copy-feedback {
        margin: 0.65rem 0 0;
        font-size: 0.95rem;
      }
    </style>
    <script defer src="/assets/vendor/auth0-spa-js.umd.min.js"></script>
    <script defer src="/assets/dex-auth0-config.js"></script>
    <script defer src="/assets/dex-auth.js"></script>
    <script defer src="/assets/js/header-slot.js"></script>
    <script defer src="/assets/js/dx-scroll-dot.js"></script>
<script defer src="/assets/js/interactive-hover.js"></script>
    <script defer src="/assets/js/support-status.js"></script>
  </head>
  <body>
    <main id="page" class="dx-utility-wrap" tabindex="-1">
      <section id="dx-error" class="dx-utility-stack" data-dx-fetch-state="loading" aria-busy="true">
        <div class="dx-fetch-shell-overlay" aria-hidden="true">
          <div class="dx-fetch-shell dx-fetch-shell--card">
            <span class="dx-fetch-shell-pill"></span>
            <span class="dx-fetch-shell-line"></span>
            <span class="dx-fetch-shell-line"></span>
            <span class="dx-fetch-shell-line" style="width: 65%;"></span>
          </div>
        </div>
        <section class="dx-utility-panel" aria-live="polite">
          <p class="dx-utility-kicker">system message</p>
          <div class="dx-utility-auth-mount" data-dx-auth-mount></div>
          <h1 id="dx-error-title" class="dx-utility-title" data-dx-heading-target="error-title">Something went wrong</h1>
          <p id="dx-error-message" class="dx-utility-copy">We could not complete that request. Try again or open support.</p>
          <div class="dx-utility-actions">
            <a href="/" class="dx-button-element dx-button-element--primary dx-button-size--md" data-dx-error-action="retry">Retry</a>
            <a href="/" class="dx-button-element dx-button-element--secondary dx-button-size--md" data-dx-error-action="home">Home</a>
            <a href="/support/" class="dx-button-element dx-button-element--secondary dx-button-size--md" data-dx-error-action="support">Support</a>
          </div>
          <details id="dx-error-diagnostics">
            <summary>Technical details</summary>
            <dl>
              <dt>Status code</dt>
              <dd id="dx-error-code">unknown</dd>
              <dt>Source</dt>
              <dd id="dx-error-source">unknown</dd>
              <dt>Request id</dt>
              <dd id="dx-error-rid">none</dd>
              <dt>Requested from</dt>
              <dd id="dx-error-from">/</dd>
              <dt>Referrer host</dt>
              <dd id="dx-error-referrer">none</dd>
            </dl>
            <pre id="dx-error-report">Preparing report…</pre>
            <div class="dx-utility-actions">
              <button type="button" class="dx-button-element dx-button-element--secondary dx-button-size--sm" data-dx-error-action="copy-report">Copy report</button>
            </div>
            <p id="dx-error-copy-feedback" role="status" aria-live="polite"></p>
          </details>
        </section>
      </section>
    </main>
  </body>
</html>
